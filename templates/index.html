<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>S&P 500 Relative Strength Screener</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.7/axios.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      h2 {
        margin-top: 0;
      }
      .controls {
        margin-bottom: 10px;
      }
      .controls label {
        margin-right: 4px;
      }
      .controls input[type="date"] {
        margin-right: 8px;
      }
      .tables-container {
        display: flex;
        gap: 20px;
        margin-top: 10px;
      }
      .table-wrapper {
        flex: 1;
      }
      table {
        width: 100%;
        font-size: 12px;
        border-collapse: collapse;
      }
      table th,
      table td {
        padding: 4px;
        border-bottom: 1px solid #ddd;
        text-align: left;
      }
      #rs-table thead th {
        cursor: pointer;
      }
      #status {
        font-size: 12px;
        color: #555;
        margin-left: 10px;
      }
      .charts-container {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }
      .chart-wrapper {
        flex: 1;
        min-height: 300px;
      }
      .clickable-row {
        cursor: pointer;
      }
      .selected-row {
        background-color: #e3f2fd;
      }
    </style>
  </head>
  <body>
    <h2>S&P 500 Relative Strength Screener</h2>
    <p>
      <a href="{{ url_for('universe') }}">Edit screening universe</a>
    </p>

    <div class="controls">
      <label for="start-date">Start:</label>
      <input type="date" id="start-date" value="{{ default_start_date }}" />
      <label for="end-date">End:</label>
      <input type="date" id="end-date" value="{{ default_end_date }}" />
      <button id="refresh-button">Refresh Data</button>
      <span id="status"></span>
    </div>

    <div class="tables-container">
      <div class="table-wrapper">
        <h4>Relative Strength Table</h4>
        <table id="rs-table">
          <thead>
            <tr>
              <th data-key="Ticker">Ticker</th>
              <th data-key="OpenPrice">Open</th>
              <th data-key="ClosePrice">Close</th>
              <th data-key="StockReturn">% Change</th>
              <th data-key="PctVsQQQ">% vs QQQ</th>
              <th data-key="PctVsSPY">% vs SPY</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="charts-container">
      <div class="chart-wrapper">
        <h4>Selected Stock vs Index (% change)</h4>
        <div id="price-chart-relative"></div>

        <h4 style="margin-top: 20px">
          Selected Stock % Deviation vs QQQ and SPY
        </h4>
        <div id="deviation-chart"></div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
  </body>
</html>
